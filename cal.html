<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Schedule</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #ffffff;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: 600;
}

.calendar-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 80px);
}

.calendar-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
</style>
</head>

<body>

<div class="header">
Schedule
</div>

<div class="calendar-container">
<iframe src="https://calendar.google.com/calendar/embed?src=5480gilj7v3m971udrfc9lh6gi2o8e7n%40import.calendar.google.com&ctz=Europe%2FBerlin"></iframe>
</div>

</body>
</html>
